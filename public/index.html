<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyJo Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="lobby" class="screen">
    <h1>SkyJo Prototype</h1>
    <div id="openRooms">
      <h3>Open Rooms</h3>
      <ul id="roomList"></ul>
    </div>
    <div id="nameInput">
      <input id="playerName" placeholder="Your name" maxlength="20">
      <button id="createBtn">Create Room</button>
      <button id="joinBtn">Join Room</button>
    </div>
    <div id="roomCodeInput" style="display:none;">
      <input id="roomCode" placeholder="Room Code" maxlength="4">
    </div>
    <div id="roomInfo" style="display:none;">
      <p>Room: <span id="roomCodeDisp"></span></p>
      <div id="playersList"></div>
      <button id="startBtn" style="display:none;">Start Game</button>
    </div>
  </div>

  <div id="game" class="screen" style="display:none;">
    <h1>SkyJo</h1>
    <div id="gameInfo">
      <p>Room: <span id="gameRoomCode"></span></p>
      <p id="currentTurn"></p>
      <p>Deck: <span id="deckSize">0</span> | Discard: <span id="discardTop">?</span></p>
    </div>
    <div id="drawnCard" style="display:none; font-size:3em; border:2px solid gold; padding:20px; margin:20px; background:lightyellow;"></div>
    <div id="actionButtons" style="display:none; margin:20px;">
      <button id="discardBtn" style="margin-right:10px; padding:10px 20px;">Discard Card</button>
      <span style="margin-left:10px;">Then flip a card from your grid</span>
    </div>
    <div id="drawButtons" style="display:none;">
      <button id="drawDeckBtn">Draw Deck (hidden)</button>
      <button id="drawDiscardBtn">Draw Discard (visible)</button>
    </div>
    <div id="grids"></div>
    <div id="roundEndScreen" style="display:none;">
      <h2>Round Complete!</h2>
      <p>Final round triggered by: <span id="finalRoundFinisher"></span></p>
      <div id="finalScores"></div>
      <button id="nextRoundBtn" style="margin-top:20px; font-size:1.2em; padding:10px 20px;">Next Round</button>
    </div>
    <div id="endScreen" style="display:none;">
      <h2>Game Over! Winner(s): <span id="winner"></span></h2>
      <div id="finalScoresGame"></div>
      <button id="newGameBtn" style="margin-top:20px; font-size:1.2em; padding:10px 20px;">New Game</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
